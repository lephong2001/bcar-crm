
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.header { padding: 1.25rem 0 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: gap; }
.header h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.header-sub { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.25rem; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-label { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.add-form { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-full { grid-column: 1/-1; }
.form-group label { font-size: 12px; color: var(--color-text-secondary); display: block; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; font-size: 14px; padding: 7px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }
.form-group textarea { height: 56px; resize: none; }
.btn-add { background: var(--color-background-info); color: var(--color-text-info); border: none; border-radius: var(--border-radius-md); padding: 8px 20px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; }
.btn-add:hover { opacity: 0.85; }
.section-title { font-size: 14px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
.badge-moi { background: var(--color-background-info); color: var(--color-text-info); }
.badge-xem { background: #FAEEDA; color: #854F0B; }
.badge-nghi { background: #FBEAF0; color: #993556; }
.badge-chot { background: var(--color-background-success); color: var(--color-text-success); }
.badge-mat { background: var(--color-background-secondary); color: var(--color-text-secondary); }
.customer-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
.customer-card.overdue { border-left: 3px solid #E24B4A; }
.customer-card.today { border-left: 3px solid #EF9F27; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.card-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.card-phone { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.card-xe { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.card-note { font-size: 13px; color: var(--color-text-secondary); margin-top: 6px; font-style: italic; border-top: 0.5px solid var(--color-border-tertiary); padding-top: 6px; }
.card-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.follow-tag { font-size: 12px; display: flex; align-items: center; gap: 4px; }
.follow-tag.overdue { color: #A32D2D; }
.follow-tag.today { color: #854F0B; }
.follow-tag.upcoming { color: var(--color-text-secondary); }
.card-actions { display: flex; gap: 6px; }
.btn-sm { font-size: 12px; padding: 4px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.btn-sm:hover { background: var(--color-background-secondary); }
.btn-del { color: #A32D2D; border-color: #F7C1C1; }
.filter-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-btn { font-size: 13px; padding: 5px 14px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.filter-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; }
.empty { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px; }
.toggle-form { font-size: 13px; color: var(--color-text-info); cursor: pointer; background: none; border: none; padding: 0; }
</style>

<h2 class="sr-only">CRM quan ly khach hang xe Bcar Ha Noi</h2>

<div class="header">
  <div>
    <div class="header-sub">Bcar Ha Noi — Mr Phong</div>
    <h2>Quan ly khach hang</h2>
  </div>
  <button class="toggle-form" onclick="toggleForm()" id="toggleBtn"><i class="ti ti-plus" aria-hidden="true"></i> Them khach</button>
</div>

<div class="stats" id="stats"></div>

<div class="add-form" id="addForm" style="display:none">
  <div class="form-grid">
    <div class="form-group"><label>Ten khach *</label><input id="f-ten" placeholder="Nguyen Van A" /></div>
    <div class="form-group"><label>So dien thoai *</label><input id="f-sdt" placeholder="0912 345 678" /></div>
    <div class="form-group"><label>Xe quan tam</label><input id="f-xe" placeholder="Everest Titanium 2025" /></div>
    <div class="form-group"><label>Trang thai</label>
      <select id="f-tt">
        <option value="moi">Moi hoi</option>
        <option value="xem">Da xem xe</option>
        <option value="nghi">Dang nghi</option>
        <option value="chot">Da chot</option>
        <option value="mat">Mat khach</option>
      </select>
    </div>
    <div class="form-group"><label>Ngay follow-up</label><input id="f-date" type="date" /></div>
    <div class="form-group form-full"><label>Ghi chu</label><textarea id="f-note" placeholder="Khach thich mau xam, can 7 cho..."></textarea></div>
  </div>
  <button class="btn-add" onclick="addKhach()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Luu khach hang</button>
</div>

<div class="filter-bar" id="filterBar"></div>
<div id="list"></div>

<script>
const STATUSES = {
  moi: { label: 'Moi hoi', cls: 'badge-moi' },
  xem: { label: 'Da xem xe', cls: 'badge-xem' },
  nghi: { label: 'Dang nghi', cls: 'badge-nghi' },
  chot: { label: 'Da chot', cls: 'badge-chot' },
  mat: { label: 'Mat khach', cls: 'badge-mat' }
};

let filter = 'all';
let data = [];

try {
  const saved = localStorage.getItem('bcar_crm');
  if (saved) data = JSON.parse(saved);
} catch(e) {}

if (!data.length) {
  data = [
    { id: 1, ten: 'Anh Minh', sdt: '0912 111 222', xe: 'Everest Titanium 2025', tt: 'nghi', date: getFutureDate(0), note: 'Can gia tot hon, so sanh voi Fortuner', ts: Date.now()-1000 },
    { id: 2, ten: 'Anh Tuan', sdt: '0987 333 444', xe: 'Everest Platinum 2024', tt: 'xem', date: getFutureDate(-2), note: 'Da lai thu, rat thich noi that', ts: Date.now()-2000 },
    { id: 3, ten: 'Chi Lan', sdt: '0901 555 666', xe: 'Everest Titanium 2023', tt: 'moi', date: getFutureDate(3), note: 'Mua cho chong, can xe 7 cho gam cao', ts: Date.now()-3000 }
  ];
  save();
}

function getFutureDate(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().split('T')[0];
}

function save() {
  try { localStorage.setItem('bcar_crm', JSON.stringify(data)); } catch(e) {}
}

function toggleForm() {
  const f = document.getElementById('addForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  document.getElementById('toggleBtn').innerHTML = f.style.display === 'none'
    ? '<i class="ti ti-plus" aria-hidden="true"></i> Them khach'
    : '<i class="ti ti-x" aria-hidden="true"></i> Dong';
}

function addKhach() {
  const ten = document.getElementById('f-ten').value.trim();
  const sdt = document.getElementById('f-sdt').value.trim();
  if (!ten || !sdt) { alert('Vui long nhap ten va so dien thoai'); return; }
  data.unshift({
    id: Date.now(),
    ten, sdt,
    xe: document.getElementById('f-xe').value.trim(),
    tt: document.getElementById('f-tt').value,
    date: document.getElementById('f-date').value,
    note: document.getElementById('f-note').value.trim(),
    ts: Date.now()
  });
  save();
  ['f-ten','f-sdt','f-xe','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-tt').value = 'moi';
  document.getElementById('f-date').value = '';
  toggleForm();
  render();
}

function deleteKhach(id) {
  if (!confirm('Xoa khach hang nay?')) return;
  data = data.filter(k => k.id !== id);
  save();
  render();
}

function changeStatus(id, newTt) {
  const k = data.find(d => d.id === id);
  if (k) { k.tt = newTt; save(); render(); }
}

function getDateStatus(dateStr) {
  if (!dateStr) return null;
  const today = new Date().toISOString().split('T')[0];
  if (dateStr < today) return 'overdue';
  if (dateStr === today) return 'today';
  return 'upcoming';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}

function renderStats() {
  const today = new Date().toISOString().split('T')[0];
  const overdue = data.filter(k => k.date && k.date < today && k.tt !== 'chot' && k.tt !== 'mat').length;
  const hot = data.filter(k => k.date === today).length;
  const active = data.filter(k => k.tt !== 'chot' && k.tt !== 'mat').length;
  const chot = data.filter(k => k.tt === 'chot').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num" style="color:#A32D2D">${overdue}</div><div class="stat-label">Tre follow-up</div></div>
    <div class="stat"><div class="stat-num" style="color:#854F0B">${hot}</div><div class="stat-label">Follow hom nay</div></div>
    <div class="stat"><div class="stat-num">${active}</div><div class="stat-label">Dang xu ly</div></div>
    <div class="stat"><div class="stat-num" style="color:#3B6D11">${chot}</div><div class="stat-label">Da chot</div></div>
  `;
}

function renderFilters() {
  const filters = [['all','Tat ca'], ['urgent','Can follow gap'], ['moi','Moi hoi'], ['xem','Da xem xe'], ['nghi','Dang nghi'], ['chot','Da chot']];
  document.getElementById('filterBar').innerHTML = filters.map(([val, label]) =>
    `<button class="filter-btn ${filter===val?'active':''}" onclick="setFilter('${val}')">${label}</button>`
  ).join('');
}

function setFilter(f) { filter = f; render(); }

function render() {
  renderStats();
  renderFilters();
  const today = new Date().toISOString().split('T')[0];

  let filtered = [...data];
  if (filter === 'urgent') filtered = filtered.filter(k => k.date && k.date <= today && k.tt !== 'chot' && k.tt !== 'mat');
  else if (filter !== 'all') filtered = filtered.filter(k => k.tt === filter);

  filtered.sort((a,b) => {
    const ds = s => !s ? 2 : s < today ? 0 : s === today ? 1 : 2;
    return ds(a.date) - ds(b.date) || b.ts - a.ts;
  });

  if (!filtered.length) {
    document.getElementById('list').innerHTML = '<div class="empty"><i class="ti ti-inbox" style="font-size:28px;display:block;margin:0 auto 8px" aria-hidden="true"></i>Chua co khach hang nao</div>';
    return;
  }

  document.getElementById('list').innerHTML = filtered.map(k => {
    const ds = getDateStatus(k.date);
    const st = STATUSES[k.tt];
    const cardCls = ds === 'overdue' ? 'customer-card overdue' : ds === 'today' ? 'customer-card today' : 'customer-card';
    const followLabel = ds === 'overdue'
      ? `<span class="follow-tag overdue"><i class="ti ti-alert-circle" aria-hidden="true"></i> Tre ${formatDate(k.date)}</span>`
      : ds === 'today'
      ? `<span class="follow-tag today"><i class="ti ti-clock" aria-hidden="true"></i> Hom nay</span>`
      : k.date
      ? `<span class="follow-tag upcoming"><i class="ti ti-calendar" aria-hidden="true"></i> ${formatDate(k.date)}</span>`
      : `<span class="follow-tag upcoming"></span>`;

    const statusOpts = Object.entries(STATUSES).filter(([v]) => v !== k.tt)
      .map(([v,s]) => `<option value="${v}">${s.label}</option>`).join('');

    return `<div class="${cardCls}">
      <div class="card-top">
        <div>
          <div class="card-name">${k.ten}</div>
          <div class="card-phone"><i class="ti ti-phone" style="font-size:13px" aria-hidden="true"></i> ${k.sdt}</div>
          ${k.xe ? `<div class="card-xe"><i class="ti ti-car" style="font-size:13px" aria-hidden="true"></i> ${k.xe}</div>` : ''}
        </div>
        <span class="badge ${st.cls}">${st.label}</span>
      </div>
      ${k.note ? `<div class="card-note">${k.note}</div>` : ''}
      <div class="card-bottom">
        ${followLabel}
        <div class="card-actions">
          <select class="btn-sm" style="padding:4px 6px;font-size:12px" onchange="changeStatus(${k.id}, this.value)" title="Doi trang thai">
            <option value="${k.tt}" disabled selected>Doi trang thai</option>
            ${statusOpts}
          </select>
          <button class="btn-sm btn-del" onclick="deleteKhach(${k.id})" title="Xoa"><i class="ti ti-trash" aria-hidden="true"></i></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

render();
</script>
